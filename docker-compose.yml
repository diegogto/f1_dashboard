version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://f1user:f1pass@db:5432/f1db
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      CRON_SECRET: dev_secret_change_in_prod
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      # Mount credentials for seed script (only needed during initial seed)
      - ./scraper/google_creds.json:/app/scraper/google_creds.json:ro

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: f1user
      POSTGRES_PASSWORD: f1pass
      POSTGRES_DB: f1db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U f1user -d f1db"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgdata:
    driver: local
